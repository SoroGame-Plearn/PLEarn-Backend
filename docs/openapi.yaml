openapi: 3.0.3
info:
  title: PLEarn Backend API
  description: >
    Progress tracking, achievement scoring, and Stellar-powered reward distribution
    for the PLEarn platform. See docs/API-INTEGRATION-GUIDE.md for a narrative walkthrough.
  version: "1.0.0"
  contact:
    name: PLEarn Backend
servers:
  - url: http://localhost:3000/api/v1
    description: Local development
  - url: https://api.plearn.example.com/api/v1
    description: Production (placeholder — replace with actual deployment URL)

tags:
  - name: Auth
    description: Registration, login, and account recovery
  - name: Users
    description: User profile management
  - name: Challenges
    description: Challenge catalogue
  - name: Progress
    description: Challenge completion and activity log
  - name: Rewards
    description: Reward history

paths:
  /auth/register:
    post:
      tags: [Auth]
      summary: Register a new user
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserDto'
      responses:
        '201':
          description: User registered, JWT issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokenResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '409':
          description: Email already registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/login:
    post:
      tags: [Auth]
      summary: Login with email and password
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginDto'
      responses:
        '201':
          description: JWT issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokenResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/forgot-password:
    post:
      tags: [Auth]
      summary: Request a password reset email
      description: Always returns 200 with a generic message to prevent account enumeration. Rate limited to 3 requests/minute/IP.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForgotPasswordDto'
      responses:
        '200':
          description: Generic success message
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '400':
          description: A reset email was already sent recently for this account
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          $ref: '#/components/responses/RateLimited'

  /auth/reset-password:
    post:
      tags: [Auth]
      summary: Reset password using an emailed token
      description: Token is single-use and expires 1 hour after issuance. Rate limited to 5 requests/minute/IP.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPasswordDto'
      responses:
        '200':
          description: Password successfully reset
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '400':
          description: Invalid, expired, or already-used token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          $ref: '#/components/responses/RateLimited'

  /users/me:
    get:
      tags: [Users]
      summary: Get the current authenticated user's profile
      responses:
        '200':
          description: Current user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'
    patch:
      tags: [Users]
      summary: Update the current user's username and/or Stellar public key
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserDto'
      responses:
        '200':
          description: Updated user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /users/{id}:
    get:
      tags: [Users]
      summary: Get a user profile by ID
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '200':
          description: User profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /challenges:
    get:
      tags: [Challenges]
      summary: List all active challenges (Redis-cached, 5 min TTL)
      responses:
        '200':
          description: List of active challenges
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Challenge'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /challenges/{id}:
    get:
      tags: [Challenges]
      summary: Get a single challenge by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Challenge details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Challenge'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /progress:
    post:
      tags: [Progress]
      summary: Record a completed challenge/activity
      description: >
        Adds the score to the user's total, records a progress entry, and synchronously
        triggers reward evaluation. Fails with 409 if this challenge was already completed
        by this user.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RecordProgressDto'
      responses:
        '201':
          description: Progress entry recorded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProgressEntry'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          description: Challenge already completed by this user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    get:
      tags: [Progress]
      summary: Get all completed challenges for the current user
      responses:
        '200':
          description: List of progress entries, newest first
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProgressEntry'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /progress/activity-log:
    get:
      tags: [Progress]
      summary: Get recent activity for the current user
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Recent activity, newest first
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProgressEntry'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /rewards:
    get:
      tags: [Rewards]
      summary: Get the current user's reward history
      responses:
        '200':
          description: List of rewards, newest first
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Reward'
        '401':
          $ref: '#/components/responses/Unauthorized'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    UserId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid

  responses:
    Unauthorized:
      description: Missing, malformed, or expired JWT
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ValidationError:
      description: Request body failed validation
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ValidationErrorResponse'
    RateLimited:
      description: Too many requests
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    ErrorResponse:
      type: object
      properties:
        statusCode:
          type: integer
          example: 400
        message:
          type: string
          example: Invalid credentials
        error:
          type: string
          example: Bad Request

    ValidationErrorResponse:
      type: object
      properties:
        statusCode:
          type: integer
          example: 400
        message:
          type: array
          items:
            type: string
          example: ["email must be an email", "password must be longer than or equal to 8 characters"]
        error:
          type: string
          example: Bad Request

    MessageResponse:
      type: object
      properties:
        message:
          type: string

    AuthTokenResponse:
      type: object
      properties:
        accessToken:
          type: string
          description: JWT bearer token. No refresh token is issued in this version — see docs/API-INTEGRATION-GUIDE.md.

    CreateUserDto:
      type: object
      required: [email, username, password]
      properties:
        email:
          type: string
          format: email
        username:
          type: string
        password:
          type: string
          minLength: 8

    LoginDto:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8

    ForgotPasswordDto:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email

    ResetPasswordDto:
      type: object
      required: [token, newPassword]
      properties:
        token:
          type: string
        newPassword:
          type: string
          minLength: 8

    UpdateUserDto:
      type: object
      properties:
        username:
          type: string
        stellarPublicKey:
          type: string

    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        username:
          type: string
        stellarPublicKey:
          type: string
          nullable: true
        totalScore:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Challenge:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
        difficulty:
          type: string
          enum: [beginner, intermediate, advanced]
        maxScore:
          type: integer
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time

    RecordProgressDto:
      type: object
      required: [challengeId, activityType, score]
      properties:
        challengeId:
          type: string
          format: uuid
        activityType:
          type: string
          enum: [challenge_completed, lesson_completed, quiz_passed]
        score:
          type: integer
          minimum: 0
        metadata:
          type: object
          additionalProperties: true

    ProgressEntry:
      type: object
      properties:
        id:
          type: string
          format: uuid
        challengeId:
          type: string
          format: uuid
        activityType:
          type: string
          enum: [challenge_completed, lesson_completed, quiz_passed]
        score:
          type: integer
        metadata:
          type: object
          additionalProperties: true
          nullable: true
        completedAt:
          type: string
          format: date-time

    Reward:
      type: object
      properties:
        id:
          type: string
          format: uuid
        amount:
          type: string
          description: Decimal XLM amount (7 decimal places)
          example: "5.0000000"
        status:
          type: string
          enum: [pending, distributed, failed]
        txHash:
          type: string
          nullable: true
        reason:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time

security:
  - bearerAuth: []
